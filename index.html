<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#b8d9b2"/>
<title>Focus & Breathe</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(160deg, #d4e8d0 0%, #b8d9b2 40%, #c9e0c4 100%);
  background-attachment: fixed;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 1.5rem 1rem 3rem;
}

.app { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 1.4rem; }

.tabs {
  display: flex;
  background: rgba(255,255,255,0.35);
  border: 1.5px solid rgba(255,255,255,0.6);
  border-radius: 16px; padding: 4px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}

.tab {
  flex: 1; padding: 10px; border: none; border-radius: 12px;
  background: transparent; font-size: 13px; font-weight: 600;
  color: #5a7a56; cursor: pointer; letter-spacing: 0.06em;
  text-transform: uppercase; transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { background: rgba(255,255,255,0.75); color: #2e5e2a; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }

.panel { display: none; flex-direction: column; align-items: center; gap: 1.6rem; }
.panel.visible { display: flex; }

.card {
  width: 100%;
  background: rgba(255,255,255,0.38);
  border: 1.5px solid rgba(255,255,255,0.62);
  border-radius: 20px; padding: 1.4rem;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: #4a7a44;
  align-self: flex-start;
}

/* ── Breathe ── */
.techniques { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }

.tech-btn {
  background: rgba(255,255,255,0.42); border: 1.5px solid rgba(255,255,255,0.65);
  border-radius: 14px; padding: 11px 13px; cursor: pointer; text-align: left;
  transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.tech-btn:active { transform: scale(0.97); }
.tech-btn.active { background: rgba(255,255,255,0.72); border-color: #5a9e52; box-shadow: 0 0 0 3px rgba(90,158,82,0.18); }
.t-name { font-size: 13px; font-weight: 600; color: #2e5e2a; }
.t-hint { font-size: 11px; color: #5a7a56; margin-top: 2px; }
.t-timing { font-size: 10px; color: #7a9a76; margin-top: 3px; }

.phase-text { font-size: 22px; font-weight: 500; color: #2e5e2a; min-height: 30px; text-align: center; }
.count-text { font-size: 13px; color: #5a7a56; min-height: 20px; text-align: center; }
.dots { display: flex; gap: 7px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(90,158,82,0.22); transition: background 0.35s; }
.dot.done { background: #4a8e42; }

/* ── Pomodoro ── */
.pom-mode-row { display: flex; gap: 8px; width: 100%; }
.mode-btn {
  flex: 1; padding: 9px 6px;
  background: rgba(255,255,255,0.4); border: 1.5px solid rgba(255,255,255,0.62);
  border-radius: 12px; font-size: 12px; font-weight: 600;
  color: #5a7a56; cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn.active { background: rgba(255,255,255,0.75); border-color: #5a9e52; color: #2e5e2a; box-shadow: 0 0 0 3px rgba(90,158,82,0.15); }

.pom-timer-display { font-size: 64px; font-weight: 300; color: #2e5e2a; letter-spacing: -2px; text-align: center; line-height: 1; padding: 0.4rem 0; }
.pom-session-info { font-size: 12px; color: #5a7a56; text-align: center; min-height: 18px; }

.pom-progress { width: 100%; height: 5px; background: rgba(90,158,82,0.18); border-radius: 99px; overflow: hidden; }
.pom-progress-bar { height: 100%; width: 0%; background: #4a8e42; border-radius: 99px; transition: width 0.5s linear; }

.sessions-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.session-dots { display: flex; gap: 6px; flex-wrap: wrap; }
.s-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(90,158,82,0.22); transition: background 0.3s; }
.s-dot.done { background: #4a8e42; }

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.setting-item label { font-size: 11px; color: #5a7a56; display: block; margin-bottom: 5px; font-weight: 500; }
.setting-item input[type=number] {
  width: 100%; padding: 9px 10px;
  background: rgba(255,255,255,0.5); border: 1.5px solid rgba(255,255,255,0.65);
  border-radius: 10px; font-size: 15px; font-weight: 600;
  color: #2e5e2a; text-align: center; outline: none;
  -moz-appearance: textfield;
}
.setting-item input[type=number]::-webkit-inner-spin-button,
.setting-item input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.setting-item input[type=number]:focus { border-color: #5a9e52; box-shadow: 0 0 0 3px rgba(90,158,82,0.15); }

/* Task list */
.task-input-row { display: flex; gap: 8px; width: 100%; }
.task-input {
  flex: 1; padding: 10px 13px;
  background: rgba(255,255,255,0.5); border: 1.5px solid rgba(255,255,255,0.65);
  border-radius: 12px; font-size: 14px; color: #2e5e2a; outline: none;
}
.task-input:focus { border-color: #5a9e52; box-shadow: 0 0 0 3px rgba(90,158,82,0.15); }
.task-input::placeholder { color: #8aaa86; }

.task-list { width: 100%; display: flex; flex-direction: column; gap: 7px; }
.task-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.42); border: 1.5px solid rgba(255,255,255,0.62);
  border-radius: 12px; transition: opacity 0.2s;
}
.task-item.done { opacity: 0.55; }
.task-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid #5a9e52; background: transparent;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; -webkit-tap-highlight-color: transparent;
}
.task-check.checked { background: #4a8e42; border-color: #4a8e42; }
.task-check.checked::after {
  content: ''; width: 5px; height: 9px;
  border: 2px solid #fff; border-top: none; border-left: none;
  transform: rotate(45deg) translateY(-1px); display: block;
}
.task-text { flex: 1; font-size: 13px; color: #2e5e2a; line-height: 1.4; }
.task-item.done .task-text { text-decoration: line-through; color: #7a9a76; }
.task-del {
  width: 22px; height: 22px; background: transparent; border: none;
  color: #9aaa96; cursor: pointer; font-size: 18px; line-height: 1;
  flex-shrink: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent;
}
.task-del:hover { color: #c0392b; background: rgba(192,57,43,0.08); }
.no-tasks { font-size: 12px; color: #8aaa86; text-align: center; padding: 12px 0; width: 100%; }

/* ── Shared buttons ── */
.btn-row { display: flex; gap: 10px; width: 100%; }
.btn-primary {
  flex: 1; padding: 15px; background: #4a8e42; border: none;
  border-radius: 15px; font-size: 15px; font-weight: 600;
  color: #fff; cursor: pointer; transition: background 0.2s, transform 0.1s;
  box-shadow: 0 4px 16px rgba(74,142,66,0.28);
  -webkit-tap-highlight-color: transparent; letter-spacing: 0.02em;
}
.btn-primary:hover { background: #3d7a36; }
.btn-primary:active { transform: scale(0.97); }

.btn-secondary {
  width: 52px; height: 52px; flex-shrink: 0;
  background: rgba(255,255,255,0.42); border: 1.5px solid rgba(255,255,255,0.65);
  border-radius: 15px; font-size: 20px; color: #4a7a44; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.62); }
.btn-secondary:active { transform: scale(0.97); }

.btn-add {
  width: 44px; height: 44px; flex-shrink: 0;
  background: #4a8e42; border: none; border-radius: 12px;
  font-size: 24px; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(74,142,66,0.28);
  transition: background 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { background: #3d7a36; }
.btn-add:active { transform: scale(0.97); }

.footer {
  display: flex; justify-content: space-between; width: 100%;
  font-size: 12px; color: #5a7a56; padding-top: 0.6rem;
  border-top: 1px solid rgba(90,122,86,0.2);
}
.footer b { color: #2e5e2a; }

@media (min-width: 600px) {
  body { padding: 2.5rem 1.5rem 3rem; align-items: center; }
  .pom-timer-display { font-size: 76px; }
  .btn-primary { font-size: 16px; padding: 16px; }
}
@media (max-height: 650px) and (orientation: landscape) {
  body { align-items: flex-start; padding: 1rem; }
  .pom-timer-display { font-size: 52px; }
}
@media (max-width: 360px) {
  .pom-timer-display { font-size: 54px; }
  .t-name { font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('breathe')">🌿 Breathe</button>
    <button class="tab" onclick="switchTab('pomodoro')">🍅 Focus</button>
  </div>

  <!-- BREATHE -->
  <div class="panel visible" id="panel-breathe">
    <div class="techniques" id="techGrid"></div>
    <div class="card">
      <div class="phase-text" id="phaseLabel">Ready</div>
      <svg width="180" height="180" viewBox="0 0 180 180" style="overflow:visible;">
        <circle cx="90" cy="90" r="68" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <circle cx="90" cy="90" r="48" fill="rgba(255,255,255,0.28)" id="innerCircle" style="transition:r .12s linear;"/>
        <circle cx="90" cy="90" r="68" fill="none" stroke="rgba(90,158,82,0.18)" stroke-width="7" stroke-linecap="round"/>
        <circle cx="90" cy="90" r="68" fill="none" stroke="#4a8e42" stroke-width="7"
          stroke-dasharray="427" stroke-dashoffset="427" stroke-linecap="round"
          transform="rotate(-90 90 90)" id="breatheRing" style="transition:stroke .4s;"/>
      </svg>
      <div class="count-text" id="bCountLabel">Select a technique to begin</div>
      <div class="dots" id="bDots"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="bStartBtn" onclick="bToggle()">Start</button>
      <button class="btn-secondary" onclick="bReset()">↺</button>
    </div>
    <div class="footer">
      <span>Cycles: <b id="bCycleCount">0</b></span>
      <span>Session: <b id="bTime">0:00</b></span>
      <span>Target: <b id="bTarget">—</b></span>
    </div>
  </div>

  <!-- POMODORO -->
  <div class="panel" id="panel-pomodoro">
    <div class="pom-mode-row" id="modeRow"></div>
    <div class="card">
      <div class="pom-timer-display" id="pomDisplay">25:00</div>
      <div class="pom-progress"><div class="pom-progress-bar" id="pomBar"></div></div>
      <div class="pom-session-info" id="pomInfo">Ready to focus</div>
      <div class="sessions-row">
        <span style="font-size:12px;color:#5a7a56;">Sessions</span>
        <div class="session-dots" id="sessionDots"></div>
      </div>
    </div>
    <div class="card" style="align-items:flex-start;">
      <div class="section-label">Durations (minutes)</div>
      <div class="settings-grid">
        <div class="setting-item"><label>Work</label><input type="number" id="setWork" value="25" min="1" max="90" onchange="applySettings()"/></div>
        <div class="setting-item"><label>Short break</label><input type="number" id="setShort" value="5" min="1" max="30" onchange="applySettings()"/></div>
        <div class="setting-item"><label>Long break</label><input type="number" id="setLong" value="15" min="1" max="60" onchange="applySettings()"/></div>
        <div class="setting-item"><label>Long break after</label><input type="number" id="setLongAfter" value="4" min="2" max="8" onchange="applySettings()"/></div>
      </div>
    </div>
    <div class="card" style="align-items:flex-start;">
      <div class="section-label">Session tasks</div>
      <div class="task-input-row">
        <input class="task-input" id="taskInput" type="text" placeholder="Add a task..." maxlength="80"
          onkeydown="if(event.key==='Enter') addTask()"/>
        <button class="btn-add" onclick="addTask()">+</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="no-tasks" id="noTasks">No tasks yet — add one above</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="pStartBtn" onclick="pToggle()">Start</button>
      <button class="btn-secondary" onclick="pReset()">↺</button>
    </div>
    <div class="footer">
      <span>Sessions: <b id="pSessions">0</b></span>
      <span>Total time: <b id="pTime">0:00</b></span>
    </div>
  </div>

</div>
<script>
/* ── Tab switch ── */
function switchTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&n==='breathe')||(i===1&&n==='pomodoro')));
  document.getElementById('panel-breathe').classList.toggle('visible',n==='breathe');
  document.getElementById('panel-pomodoro').classList.toggle('visible',n==='pomodoro');
}

/* ── Chime ── */
function playChime(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=type==='work'?[523,659,784]:[784,659,523];
    freqs.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const t=ctx.currentTime+i*0.22;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.18,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o.start(t);o.stop(t+0.6);
    });
  }catch(e){}
}

/* ════════ BREATHE ════════ */
const BT=[
  {name:"4-7-8",   hint:"Calm anxiety",    timing:"4s · 7s · 8s",      phases:[{l:"Inhale",t:4},{l:"Hold",t:7},{l:"Exhale",t:8}],              cycles:4},
  {name:"Box",     hint:"Focus & balance", timing:"4s · 4s · 4s · 4s", phases:[{l:"Inhale",t:4},{l:"Hold",t:4},{l:"Exhale",t:4},{l:"Hold",t:4}],cycles:4},
  {name:"4-4-4-6", hint:"Deep relax",      timing:"4s · 4s · 4s · 6s", phases:[{l:"Inhale",t:4},{l:"Hold",t:4},{l:"Exhale",t:4},{l:"Rest",t:6}],cycles:5},
  {name:"2-1-4-1", hint:"Quick reset",     timing:"2s · 1s · 4s · 1s", phases:[{l:"Inhale",t:2},{l:"Hold",t:1},{l:"Exhale",t:4},{l:"Hold",t:1}],cycles:6},
];
const BC=427;
let bCur=0,bRun=false,bTmr=null,bSTmr=null,bPh=0,bTk=0,bCyc=0,bSec=0;

function buildBGrid(){
  const g=document.getElementById('techGrid');g.innerHTML='';
  BT.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tech-btn'+(i===bCur?' active':'');
    b.innerHTML=`<div class="t-name">${t.name}</div><div class="t-hint">${t.hint}</div><div class="t-timing">${t.timing}</div>`;
    b.onclick=()=>{if(!bRun){bCur=i;buildBGrid();buildBDots();document.getElementById('bTarget').textContent=t.cycles;}};
    g.appendChild(b);
  });
}
function buildBDots(){
  const t=BT[bCur],d=document.getElementById('bDots');d.innerHTML='';
  for(let i=0;i<t.cycles;i++){const x=document.createElement('div');x.className='dot'+(i<bCyc?' done':'');d.appendChild(x);}
}
function bToggle(){bRun?bPause():bStart();}
function bStart(){
  bRun=true;document.getElementById('bStartBtn').textContent='Pause';
  if(!bSTmr)bSTmr=setInterval(()=>{bSec++;const m=Math.floor(bSec/60),s=bSec%60;document.getElementById('bTime').textContent=m+':'+(s<10?'0':'')+s;},1000);
  bRunPhase();
}
function bPause(){bRun=false;clearTimeout(bTmr);document.getElementById('bStartBtn').textContent='Resume';}
function bReset(){
  bRun=false;clearTimeout(bTmr);clearInterval(bSTmr);bSTmr=null;
  bPh=0;bTk=0;bCyc=0;bSec=0;
  document.getElementById('phaseLabel').textContent='Ready';
  document.getElementById('bCountLabel').textContent='Select a technique to begin';
  document.getElementById('breatheRing').setAttribute('stroke-dashoffset',BC);
  document.getElementById('innerCircle').setAttribute('r','48');
  document.getElementById('bCycleCount').textContent='0';
  document.getElementById('bTime').textContent='0:00';
  document.getElementById('bStartBtn').textContent='Start';
  buildBDots();
}
function bRunPhase(){
  if(!bRun)return;
  const t=BT[bCur],ph=t.phases[bPh],tot=ph.t*10;
  document.getElementById('phaseLabel').textContent=ph.l;
  function tick(){
    if(!bRun)return;
    bTk++;const pct=bTk/tot;
    document.getElementById('breatheRing').setAttribute('stroke-dashoffset',Math.round(BC*(1-pct)));
    document.getElementById('bCountLabel').textContent=Math.ceil((tot-bTk)/10)+'s';
    if(ph.l==='Inhale') document.getElementById('innerCircle').setAttribute('r',Math.round(48+20*pct));
    else if(ph.l==='Exhale') document.getElementById('innerCircle').setAttribute('r',Math.round(68-20*pct));
    else document.getElementById('innerCircle').setAttribute('r','48');
    if(bTk>=tot){
      bTk=0;bPh++;
      if(bPh>=t.phases.length){
        bPh=0;bCyc++;
        document.getElementById('bCycleCount').textContent=bCyc;
        buildBDots();
        if(bCyc>=t.cycles){
          document.getElementById('phaseLabel').textContent='Done';
          document.getElementById('bCountLabel').textContent='Session complete';
          document.getElementById('breatheRing').setAttribute('stroke-dashoffset',BC);
          document.getElementById('innerCircle').setAttribute('r','48');
          bRun=false;document.getElementById('bStartBtn').textContent='Start';
          clearInterval(bSTmr);bSTmr=null;playChime('break');return;
        }
      }
      bTmr=setTimeout(bRunPhase,80);
    } else { bTmr=setTimeout(tick,100); }
  }
  tick();
}

/* ════════ POMODORO ════════ */
const MODES=[{id:'work',label:'Work'},{id:'short',label:'Short break'},{id:'long',label:'Long break'}];
let pCfg={work:25,short:5,long:15,longAfter:4};
let pMode='work',pRun=false,pTmr=null,pSTmr=null;
let pLeft=25*60,pTotal=25*60,pSess=0,pSec=0;
let tasks=[];

function getMins(m){return(m==='work'?pCfg.work:m==='short'?pCfg.short:pCfg.long)*60;}
function buildModeRow(){
  const r=document.getElementById('modeRow');r.innerHTML='';
  MODES.forEach(m=>{
    const b=document.createElement('button');
    b.className='mode-btn'+(m.id===pMode?' active':'');
    b.textContent=m.label;
    b.onclick=()=>{if(!pRun){pMode=m.id;pLeft=getMins(m.id);pTotal=pLeft;buildModeRow();updateDisp();updateBar();}};
    r.appendChild(b);
  });
}
function buildSDots(){
  const d=document.getElementById('sessionDots');d.innerHTML='';
  const n=pCfg.longAfter;
  for(let i=0;i<n;i++){const x=document.createElement('div');x.className='s-dot'+(i<(pSess%n)?' done':'');d.appendChild(x);}
}
function updateDisp(){
  const m=Math.floor(pLeft/60),s=pLeft%60;
  document.getElementById('pomDisplay').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('pomInfo').textContent=pMode==='work'?`Focus session ${pSess+1}`:(pMode==='short'?'Short break — rest up':'Long break — you earned it');
}
function updateBar(){
  document.getElementById('pomBar').style.width=(pTotal>0?Math.round((1-pLeft/pTotal)*100):0)+'%';
}
function applySettings(){
  pCfg.work=Math.max(1,parseInt(document.getElementById('setWork').value)||25);
  pCfg.short=Math.max(1,parseInt(document.getElementById('setShort').value)||5);
  pCfg.long=Math.max(1,parseInt(document.getElementById('setLong').value)||15);
  pCfg.longAfter=Math.max(2,parseInt(document.getElementById('setLongAfter').value)||4);
  if(!pRun){pLeft=getMins(pMode);pTotal=pLeft;updateDisp();updateBar();}
  buildSDots();
}
function pToggle(){pRun?pPause():pStart();}
function pStart(){
  pRun=true;document.getElementById('pStartBtn').textContent='Pause';
  if(!pSTmr)pSTmr=setInterval(()=>{pSec++;const m=Math.floor(pSec/60),s=pSec%60;document.getElementById('pTime').textContent=m+':'+(s<10?'0':'')+s;},1000);
  pTmr=setInterval(()=>{
    pLeft--;updateDisp();updateBar();
    if(pLeft<=0){
      clearInterval(pTmr);pRun=false;document.getElementById('pStartBtn').textContent='Start';
      if(pMode==='work'){
        pSess++;document.getElementById('pSessions').textContent=pSess;buildSDots();
        playChime('break');
        pMode=pSess%pCfg.longAfter===0?'long':'short';
      } else {playChime('work');pMode='work';}
      pLeft=getMins(pMode);pTotal=pLeft;buildModeRow();updateDisp();updateBar();
    }
  },1000);
}
function pPause(){pRun=false;clearInterval(pTmr);document.getElementById('pStartBtn').textContent='Resume';}
function pReset(){
  pRun=false;clearInterval(pTmr);clearInterval(pSTmr);pSTmr=null;
  pMode='work';pSess=0;pSec=0;pLeft=getMins('work');pTotal=pLeft;
  document.getElementById('pSessions').textContent='0';
  document.getElementById('pTime').textContent='0:00';
  document.getElementById('pStartBtn').textContent='Start';
  buildModeRow();buildSDots();updateDisp();updateBar();
}

/* ── Tasks ── */
function addTask(){
  const inp=document.getElementById('taskInput'),text=inp.value.trim();
  if(!text)return;
  tasks.push({id:Date.now(),text,done:false});
  inp.value='';renderTasks();
}
function toggleTask(id){const t=tasks.find(x=>x.id===id);if(t)t.done=!t.done;renderTasks();}
function deleteTask(id){tasks=tasks.filter(x=>x.id!==id);renderTasks();}
function renderTasks(){
  const list=document.getElementById('taskList');list.innerHTML='';
  if(!tasks.length){list.innerHTML='<div class="no-tasks">No tasks yet — add one above</div>';return;}
  tasks.forEach(t=>{
    const item=document.createElement('div');item.className='task-item'+(t.done?' done':'');
    const chk=document.createElement('div');chk.className='task-check'+(t.done?' checked':'');chk.onclick=()=>toggleTask(t.id);
    const txt=document.createElement('div');txt.className='task-text';txt.textContent=t.text;
    const del=document.createElement('button');del.className='task-del';del.innerHTML='&times;';del.onclick=()=>deleteTask(t.id);
    item.appendChild(chk);item.appendChild(txt);item.appendChild(del);list.appendChild(item);
  });
}

/* ── Init ── */
buildBGrid();buildBDots();document.getElementById('bTarget').textContent=BT[0].cycles;
buildModeRow();buildSDots();updateDisp();updateBar();renderTasks();
</script>
</body>
